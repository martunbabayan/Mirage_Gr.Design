services:
  db:
    image: postgres:16
    container_name: mirage_postgres
    restart: always
    environment:
      POSTGRES_USER: mirage
      POSTGRES_PASSWORD: mirage_pass
      POSTGRES_DB: mirage_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirage_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://mirage:mirage_pass@db:5432/mirage_db
    ports:
      - "3001:3000"
    working_dir: /app/backend
    command: node server.js

volumes:
  postgres_data: