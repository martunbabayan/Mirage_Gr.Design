<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIRAGE — Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/home.css">
</head>
<body>
  <main class="hero-page">
    <section class="hero-shell">
      <header class="topbar">
        <div class="brand">
          <img src="/assets/img/logo.png" class="logo-img" alt="Mirage logo">
          <span class="brand-text">Mirage</span>
        </div>

        <nav class="nav-links">
          <a href="/">Home</a>
          <a href="/courses">Courses</a>
          <a href="/works">Our works</a>
          <a href="/about">About</a>
          <a href="/contact">Contact</a>
        </nav>

        <div id="authBox" class="auth-box">
          Loading...
        </div>
      </header>

      <div class="hero-content">
        <div class="hero-copy">
          <p class="hero-subtitle">
            Study design with us and earn money in<br>
            a modern profession
          </p>

          <div class="hero-actions">
            <a href="/level" class="hero-btn hero-btn-outline">Choose your level</a>
            <a href="/get-courses" class="hero-btn hero-btn-solid">Get courses</a>
          </div>
        </div>

        <div class="hero-title-wrap">
          <h1 class="hero-title">
            LET’S MAKE<br>
            INVISIBLE THE<br>
            VISIBLE
          </h1>
        </div>
      </div>

      <button id="chatFab" class="chat-fab" type="button" aria-label="Open live chat">
        <img src="/assets/img/live-chat.png" alt="Live chat">
      </button>

      <div id="chatBox" class="chat-box">
        <div class="chat-head">
          <span>MIRAGE Live Chat</span>
          <button id="chatClose" type="button" class="chat-close">✕</button>
        </div>

        <div id="chatMsgs" class="chat-msgs"></div>

        <form id="chatForm" class="chat-form">
          <input id="chatInput" type="text" placeholder="Write a message..." autocomplete="off" />
          <button id="chatSend" type="submit">Send</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    fetch("/api/me")
      .then((r) => {
        if (!r.ok) throw new Error("not logged");
        return r.json();
      })
      .then(() => {
        document.getElementById("authBox").innerHTML = `
          <a href="/profile" class="auth-link auth-link-outline">My profile</a>
          <a href="/auth/logout" class="auth-link auth-link-outline">Logout</a>
        `;
      })
      .catch(() => {
        document.getElementById("authBox").innerHTML = `
          <a href="/auth" class="auth-link auth-link-outline">SIGN IN / UP</a>
        `;
      });
  </script>

  <script>
    const fab = document.getElementById("chatFab");
    const box = document.getElementById("chatBox");
    const closeBtn = document.getElementById("chatClose");
    const msgs = document.getElementById("chatMsgs");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("chatInput");

    function toggleChat(open) {
      box.classList.toggle("open", open);
      if (open) loadHistory();
    }

    fab.addEventListener("click", () => toggleChat(true));
    closeBtn.addEventListener("click", () => toggleChat(false));

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function renderItem(it) {
      const div = document.createElement("div");
      div.className = "chat-item";
      div.innerHTML = `<span class="chat-sender">${escapeHtml(it.sender)}:</span> ${escapeHtml(it.message)}`;
      msgs.appendChild(div);
    }

    async function loadHistory() {
      msgs.innerHTML = "";

      try {
        const r = await fetch("/api/chat/history");
        if (!r.ok) throw new Error("Failed to load history");

        const data = await r.json();
        (data.items || []).forEach(renderItem);
        msgs.scrollTop = msgs.scrollHeight;
      } catch (err) {
        msgs.innerHTML = `<div class="chat-item">Chat is temporarily unavailable.</div>`;
        console.error(err);
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const text = input.value.trim();
      if (!text) return;

      input.value = "";

      try {
        const r = await fetch("/api/chat/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        if (!r.ok) throw new Error("Failed to send message");

        const data = await r.json();
        if (data?.item) {
          renderItem(data.item);
          msgs.scrollTop = msgs.scrollHeight;
        }
      } catch (err) {
        const div = document.createElement("div");
        div.className = "chat-item";
        div.textContent = "Message was not sent.";
        msgs.appendChild(div);
        console.error(err);
      }
    });
  </script>
</body>
</html>
