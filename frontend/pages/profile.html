<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
</head>
<body>
  <h1>My Profile</h1>

  <nav style="display: flex; justify-content: space-between; align-items: center;">
    <div>
      <a href="/">Home</a> |
      <a href="/courses">Courses</a> |
      <a href="/works">Our Works</a> |
      <a href="/about">About</a> |
      <a href="/contact">Contact</a>
    </div>

    <div id="authBox">
      Loading...
    </div>
  </nav>

  <hr />

  <div id="box">Loading...</div>

  <script>
    fetch("/api/me")
      .then(async (r) => {
        if (!r.ok) throw new Error("Not authorized");
        return r.json();
      })
      .then((data) => {
        const u = data.user;

        document.getElementById("box").innerHTML = `
          <p><b>Name:</b> ${u.first_name || ""} ${u.last_name || ""}</p>
          <p><b>Email:</b> ${u.email || "No email"}</p>
          <p><b>Role:</b> ${data.role || "User"}</p>
          <p><b>Created:</b> ${u.created_at || "Unknown"}</p>
        `;

        document.getElementById("authBox").innerHTML = `
          <a href="/profile">My profile</a> |
          <a href="/auth/logout">Logout</a>
        `;
      })
      .catch(() => {
        document.getElementById("box").innerHTML = `
          <p>You are not logged in. <a href="/auth">Go to Sign in</a></p>
        `;

        document.getElementById("authBox").innerHTML = `
          <a href="/auth">Sign in / Sign up</a>
        `;
      });
  </script>
</body>
</html>
