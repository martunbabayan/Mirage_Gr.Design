<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIRAGE — Courses</title>
</head>
<body>
  <h1>Courses</h1>

  <nav style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <a href="/">Home</a> |
      <a href="/courses">Courses</a> |
      <a href="/works">Our Works</a> |
      <a href="/about">About</a> |
      <a href="/contact">Contact</a>
    </div>

    <div id="authBox">Loading...</div>
  </nav>

  <hr />

  <section>
    <h2>MIRAGE Courses</h2>
    <p>Пока заглушка. Потом добавим контент.</p>
  </section>

  <script>
    fetch("/api/me")
      .then((r) => {
        if (!r.ok) throw new Error("not logged");
        return r.json();
      })
      .then(() => {
        document.getElementById("authBox").innerHTML = `
          <a href="/profile">My profile</a> |
          <a href="/auth/logout">Logout</a>
        `;
      })
      .catch(() => {
        document.getElementById("authBox").innerHTML = `
          <a href="/auth">Sign in / Sign up</a>
        `;
      });
  </script>

  <!-- MIRAGE Live Chat (MVP) -->
  <style>
    #chatFab {
      position: fixed;
      right: 18px;
      bottom: 18px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      background: #111;
      color: #fff;
    }

    #chatBox {
      position: fixed;
      right: 18px;
      bottom: 70px;
      width: 320px;
      max-height: 420px;
      display: none;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    #chatHead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      font-weight: 600;
    }

    #chatMsgs {
      padding: 10px 12px;
      height: 280px;
      overflow: auto;
      font-size: 14px;
    }

    .m {
      margin: 6px 0;
      line-height: 1.3;
    }

    .me {
      font-weight: 600;
    }

    #chatForm {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #eee;
    }

    #chatInput {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    #chatSend {
      padding: 10px 12px;
      border-radius: 10px;
      border: 0;
      cursor: pointer;
      background: #111;
      color: #fff;
    }
  </style>

  <button id="chatFab" type="button">Chat</button>

  <div id="chatBox">
    <div id="chatHead">
      <span>MIRAGE Live Chat</span>
      <button id="chatClose" type="button" style="border:0; background:transparent; cursor:pointer;">✕</button>
    </div>

    <div id="chatMsgs"></div>

    <form id="chatForm">
      <input id="chatInput" type="text" placeholder="Напиши сообщение..." autocomplete="off" />
      <button id="chatSend" type="submit">Send</button>
    </form>
  </div>

  <script>
    const fab = document.getElementById("chatFab");
    const box = document.getElementById("chatBox");
    const closeBtn = document.getElementById("chatClose");
    const msgs = document.getElementById("chatMsgs");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("chatInput");

    function toggleChat(open) {
      box.style.display = open ? "block" : "none";
      if (open) {
        loadHistory();
      }
    }

    fab.addEventListener("click", () => toggleChat(true));
    closeBtn.addEventListener("click", () => toggleChat(false));

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function renderItem(it) {
      const div = document.createElement("div");
      div.className = "m";
      div.innerHTML = `<span class="me">${escapeHtml(it.sender)}:</span> ${escapeHtml(it.message)}`;
      msgs.appendChild(div);
    }

    async function loadHistory() {
      msgs.innerHTML = "";

      try {
        const r = await fetch("/api/chat/history");
        if (!r.ok) throw new Error("Failed to load history");

        const data = await r.json();
        (data.items || []).forEach(renderItem);
        msgs.scrollTop = msgs.scrollHeight;
      } catch (err) {
        msgs.innerHTML = `<div class="m">Chat is temporarily unavailable.</div>`;
        console.error(err);
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const text = input.value.trim();
      if (!text) return;

      input.value = "";

      try {
        const r = await fetch("/api/chat/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        if (!r.ok) throw new Error("Failed to send message");

        const data = await r.json();
        if (data?.item) {
          renderItem(data.item);
          msgs.scrollTop = msgs.scrollHeight;
        }
      } catch (err) {
        const div = document.createElement("div");
        div.className = "m";
        div.textContent = "Message was not sent.";
        msgs.appendChild(div);
        console.error(err);
      }
    });
  </script>
  <!-- /MIRAGE Live Chat (MVP) -->
</body>
</html>
